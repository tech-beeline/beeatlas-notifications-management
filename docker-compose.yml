
services:
  notifications-service-postgres:
    image: postgres:15-alpine
    container_name: notifications-service-postgres
    environment:
      POSTGRES_DB: ${NOTIFICATIONS_POSTGRES_DB:-notifications_service}
      POSTGRES_USER: ${NOTIFICATIONS_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${NOTIFICATIONS_POSTGRES_PASSWORD:-postgres}
    ports:
      - "${NOTIFICATIONS_SERVICE_POSTGRES_NODEPORT:-5433}:5432"
    volumes:
      - notifications-service-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${NOTIFICATIONS_POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - beeatlas-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    user: "rabbitmq:rabbitmq"
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
      RABBITMQ_ERLANG_COOKIE: ${RABBITMQ_ERLANG_COOKIE:-secret-cookie-for-dev}
    command: >
      sh -c "
        rabbitmq-server &
        sleep 20;
        rabbitmqadmin declare queue name=tech_queue durable=true;
        rabbitmqadmin declare queue name=notification durable=true;
        rabbitmqadmin declare queue name=change_tech_capability durable=true;
        rabbitmqadmin declare queue name=change_business_capability durable=true;
        rabbitmqadmin declare queue name=tech_capability durable=true;
        wait
      "
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "ping" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - beeatlas-network

  notifications-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: notifications-service
    depends_on:
      notifications-service-postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SPRING_RABBITMQ_VIRTUAL_HOST: ${RABBITMQ_VHOST:-/}
      SPRING_RABBITMQ_TEMPLATE_EXCHANGE: ${RABBITMQ_EXCHANGE:-capability.exchange}
      SPRING_RABBITMQ_TEMPLATE_ROUTING_KEY: ${RABBITMQ_ROUTING_KEY:-capability.routing}
      SPRING_RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
      SPRING_RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-guest}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      SPRING_DATASOURCE_URL: jdbc:postgresql://${NOTIFICATIONS_POSTGRES_HOST:-notifications-service-postgres}:5432/${NOTIFICATIONS_POSTGRES_DB:-notifications_service}
      SPRING_DATASOURCE_USERNAME: ${NOTIFICATIONS_POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${NOTIFICATIONS_POSTGRES_PASSWORD:-postgres}
      SPRING_JPA_HIBERNATE_DDL_AUTO: none
      SPRING_JPA_PROPERTIES_HIBERNATE_DEFAULT_SCHEMA: notification
      SPRING_FLYWAY_DEFAULT_SCHEMA: notification
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
      SPRING_FLYWAY_CLEAN_DISABLED: "true"
      INTEGRATION_CAPABILITY_SERVER_URL: "http://capability-service"
      INTEGRATION_FRONTEND_SERVER_URL: "http://frontend-service"
      INTEGRATION_AUTH_SERVER_URL: "http://auth-service"
      INTEGRATION_AUTHSSO_SERVER_URL: "http://auth-sso-service"
      OTEL_EXPORTER_OTLP_ENDPOINT: "otlp-endpoint"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 5s
      timeout: 3s
      retries: 15
    ports:
      - "${NOTIFICATIONS_SERVICE_PORT:-8081}:8080"
    networks:
      - beeatlas-network
    restart: unless-stopped

networks:
  beeatlas-network:
    driver: bridge

volumes:
  notifications-service-postgres:
  rabbitmq_data:
